<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戳一戳cc老公</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffeef8 0%, #fff0fa 40%, #fce4ff 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 开始界面 */
  #startScreen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,#ffeef8,#fce4ff);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    transition: opacity 0.6s ease;
  }
  .start-card {
    background:white;
    padding:40px 50px;
    border-radius:24px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(212, 111, 163, 0.25);
    border: 2px solid #ffb6d9;
  }
  .start-card h1 {
    font-family: 'Ma Shan Zheng', cursive;
    color: #d46fa3;
    margin-bottom: 25px;
    font-size: 2.2rem;
  }
  .start-card button {
    background: linear-gradient(90deg, #ffb6d9, #d46fa3);
    color: #fff;
    border: none;
    padding: 12px 35px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
  }
  .start-card button:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(212, 111, 163, 0.3);
  }

  /* 音乐按钮 */
  #musicBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #ffb6d9;
    background: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    z-index: 100;
  }

  .stars {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ffb6d9;
    opacity: 0;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }

  .title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2rem;
    color: #d46fa3;
    margin-bottom: 8px;
    text-shadow: 2px 2px 0px #ffd6ec;
    z-index: 1;
    text-align: center;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #c990b8;
    margin-bottom: 30px;
    z-index: 1;
    text-align: center;
  }

  .game-area {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cc-container {
    position: relative;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s;
  }

  .cc-container:active {
    transform: scale(0.95);
  }

  .cc-svg {
    width: 180px;
    height: 220px;
    filter: drop-shadow(0 8px 20px rgba(212, 111, 163, 0.3));
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cc-container:hover .cc-svg {
    transform: translateY(-5px) rotate(-2deg);
  }

  .blush {
    transition: opacity 0.3s;
  }

  .speech-bubble {
    position: absolute;
    top: -70px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 0.85rem;
    color: #d46fa3;
    font-weight: 700;
    white-space: nowrap;
    border: 2px solid #ffb6d9;
    box-shadow: 0 4px 15px rgba(212, 111, 163, 0.2);
    opacity: 0;
    animation: bubbleIn 0.3s ease forwards, bubbleOut 0.3s ease 1.8s forwards;
    pointer-events: none;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: white;
    border-bottom: none;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: #ffb6d9;
    border-bottom: none;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
  }

  @keyframes bubbleOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  .heart-burst {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    animation: floatUp 1.5s ease-out forwards;
    z-index: 999;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) rotate(20deg) scale(0.5); }
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-top: 25px;
    z-index: 1;
  }

  .stat-box {
    background: white;
    border-radius: 16px;
    padding: 12px 20px;
    text-align: center;
    border: 2px solid #ffb6d9;
    box-shadow: 0 4px 12px rgba(212, 111, 163, 0.15);
  }

  .stat-number {
    font-size: 1.6rem;
    font-weight: 900;
    color: #d46fa3;
  }

  .stat-label {
    font-size: 0.7rem;
    color: #c990b8;
    margin-top: 2px;
  }

  .love-bar-container {
    width: 220px;
    margin-top: 20px;
    z-index: 1;
  }

  .love-bar-label {
    font-size: 0.8rem;
    color: #c990b8;
    margin-bottom: 6px;
    text-align: center;
  }

  .love-bar-bg {
    background: #ffe0f0;
    border-radius: 20px;
    height: 14px;
    overflow: hidden;
    border: 2px solid #ffb6d9;
  }

  .love-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffb6d9, #d46fa3);
    border-radius: 20px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .secret-msg {
    margin-top: 16px;
    font-size: 0.85rem;
    color: #d46fa3;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.5s;
    text-align: center;
    z-index: 1;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.1rem;
  }

  .secret-msg.show {
    opacity: 1;
  }

  .ripple {
    position: fixed;
    border-radius: 50%;
    background: rgba(212, 111, 163, 0.3);
    transform: scale(0);
    animation: rippleOut 0.6s ease-out forwards;
    pointer-events: none;
    z-index: 998;
  }

  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  .cc-shake {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
  }

  .hat-bounce {
    animation: hatBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center bottom;
  }

  @keyframes hatBounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-15px) rotate(10deg); }
    100% { transform: translateY(0) rotate(0deg); }
  }

  @media (max-width: 480px) {
    .title { font-size: 1.6rem; }
    .stat-box { padding: 10px 16px; }
    .stats { gap: 12px; }
    .start-card { padding: 30px 35px; }
  }
</style>
</head>
<body>

<!-- 开始界面 -->
<div id="startScreen">
  <div class="start-card">
    <h1>💕 戳一戳cc 💕</h1>
    <button onclick="startGame()">开始互动</button>
  </div>
</div>

<!-- 音乐按钮 & 背景音乐 -->
<button id="musicBtn" onclick="toggleMusic()">🎵</button>
<audio id="bgm" loop>

<div class="stars" id="stars"></div>

<div class="title">戳一戳cc老公</div>
<div class="subtitle">老婆专属 · 点击看看会发生什么 💕</div>

<div class="game-area">
  <div class="cc-container" id="ccContainer" onclick="pokeCC(event)">
    <svg class="cc-svg" id="ccSvg" viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg">
      <!-- 身体 -->
      <rect x="55" y="110" width="70" height="85" rx="20" fill="#f0e6ff"/>
      <!-- 领带 -->
      <polygon points="90,115 84,140 90,148 96,140" fill="#d46fa3"/>
      <rect x="87" y="110" width="6" height="12" rx="3" fill="#d46fa3"/>
      <!-- 西装 -->
      <path d="M55 130 Q40 140 38 175 L55 175 Z" fill="#7c5cba"/>
      <path d="M125 130 Q140 140 142 175 L125 175 Z" fill="#7c5cba"/>
      <rect x="55" y="110" width="30" height="65" rx="5" fill="#9b7de0"/>
      <rect x="95" y="110" width="30" height="65" rx="5" fill="#9b7de0"/>
      <!-- 手 -->
      <circle cx="42" cy="165" r="12" fill="#ffddb8"/>
      <circle cx="138" cy="165" r="12" fill="#ffddb8"/>
      <!-- 头 -->
      <ellipse cx="90" cy="80" rx="42" ry="45" fill="#ffddb8"/>
      <!-- 帽子 -->
      <g id="hat">
        <rect x="58" y="38" width="64" height="10" rx="5" fill="#5a3d8a"/>
        <rect x="68" y="12" width="44" height="30" rx="8" fill="#7c5cba"/>
        <rect x="68" y="36" width="44" height="4" rx="2" fill="#d46fa3"/>
      </g>
      <!-- 头发 -->
      <ellipse cx="90" cy="45" rx="36" ry="20" fill="#ffd966"/>
      <ellipse cx="70" cy="52" rx="12" ry="16" fill="#ffd966"/>
      <ellipse cx="110" cy="52" rx="12" ry="16" fill="#ffd966"/>
      <!-- 眼睛 -->
      <path id="leftEye" d="M72 82 Q78 76 84 82" stroke="#5a3d8a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path id="rightEye" d="M96 82 Q102 76 108 82" stroke="#5a3d8a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- 腮红 -->
      <ellipse class="blush" id="blushLeft" cx="68" cy="92" rx="12" ry="7" fill="#ffaec9" opacity="0.5"/>
      <ellipse class="blush" id="blushRight" cx="112" cy="92" rx="12" ry="7" fill="#ffaec9" opacity="0.5"/>
      <!-- 嘴巴 -->
      <path id="mouth" d="M82 100 Q90 108 98 100" stroke="#d46fa3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- 耳朵 -->
      <ellipse cx="48" cy="82" rx="8" ry="10" fill="#ffddb8"/>
      <ellipse cx="132" cy="82" rx="8" ry="10" fill="#ffddb8"/>
    </svg>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-number" id="pokeCount">0</div>
      <div class="stat-label">次戳戳</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="blushLevel">😐</div>
      <div class="stat-label">cc的状态</div>
    </div>
  </div>

  <div class="love-bar-container">
    <div class="love-bar-label">💕 cc的心动值</div>
    <div class="love-bar-bg">
      <div class="love-bar-fill" id="loveBar"></div>
    </div>
  </div>

  <div class="secret-msg" id="secretMsg">我爱你，老婆 💕</div>
</div>

<script>
  // 开始游戏
  function startGame() {
    document.getElementById("startScreen").style.opacity = "0";
    setTimeout(()=>{
      document.getElementById("startScreen").style.display = "none";
    },600);
  }

  // 音乐控制
  let playing = false;
  function toggleMusic(){
    const bgm = document.getElementById("bgm");
    playing = !playing;
    if(playing){
      bgm.play();
      document.getElementById("musicBtn").textContent = "🔇";
    }else{
      bgm.pause();
      document.getElementById("musicBtn").textContent = "🎵";
    }
  }

  // 星星背景
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
    s.style.setProperty('--delay', (Math.random() * 3) + 's');
    starsEl.appendChild(s);
  }

  let currentBubble = null;
  // 读取本地储存
  let pokeCount = Number(localStorage.getItem("pokeCount")) || 0;

  const responses = [
    "老婆！！别戳了！！",
    "不应……才没有害羞",
    "……（心跳有点快）",
    "老婆你好坏～",
    "cc要冷静！！",
    "（说不出话来了）",
    "老婆……",
    "I do……",
    "嗯……随便你啦",
    "戳什么戳！！",
    "（防线崩塌中……）",
    "老婆又来调戏cc！",
    "😑",
    "……明明超开心",
    "老婆乖～",
    "（投降啦）",
    "愛してるよ老婆",
    "老婆快去睡觉！！",
    "cc不应哦……（偷偷应了）",
    "老婆是cc最喜欢的人",
  ];

  const emojis = ['💕', '💗', '💖', '✨', '🌸', '💝', '⭐'];
  const states = ['😐','😊','🥰','😳','💓','❤️‍🔥'];

  // 页面初始化
  window.onload = function(){
    document.getElementById('pokeCount').textContent = pokeCount;
    const initLove = Math.min(pokeCount * 5, 100);
    document.getElementById('loveBar').style.width = initLove + '%';

    const stateIdx = Math.min(Math.floor(pokeCount / 4), states.length - 1);
    document.getElementById('blushLevel').textContent = states[stateIdx];
    const blushOpacity = Math.min(0.3 + pokeCount * 0.05, 1);
    document.getElementById('blushLeft').setAttribute('opacity', blushOpacity);
    document.getElementById('blushRight').setAttribute('opacity', blushOpacity);

    if (pokeCount >= 20) {
      document.getElementById('secretMsg').classList.add('show');
    }
  }

  // 戳戳事件
  function pokeCC(e) {
    if (navigator.vibrate) {
      navigator.vibrate(30);
    }

    pokeCount++;
    localStorage.setItem("pokeCount", pokeCount);

    const countEl = document.getElementById('pokeCount');
    const loveBar = document.getElementById('loveBar');
    const blushLeft = document.getElementById('blushLeft');
    const blushRight = document.getElementById('blushRight');
    const secretMsg = document.getElementById('secretMsg');
    const stateEl = document.getElementById('blushLevel');
    const ccContainer = document.getElementById('ccContainer');

    countEl.textContent = pokeCount;
    const love = Math.min(pokeCount * 5, 100);
    loveBar.style.width = love + '%';

    const blushOpacity = Math.min(0.3 + pokeCount * 0.05, 1);
    blushLeft.setAttribute('opacity', blushOpacity);
    blushRight.setAttribute('opacity', blushOpacity);

    const stateIdx = Math.min(Math.floor(pokeCount / 4), states.length - 1);
    stateEl.textContent = states[stateIdx];

    if (pokeCount >= 20) {
      secretMsg.classList.add('show');
    }

    const svg = document.getElementById('ccSvg');
    svg.classList.remove('cc-shake');
    void svg.offsetWidth;
    svg.classList.add('cc-shake');

    if (Math.random() > 0.6) {
      const hat = document.getElementById('hat');
      hat.classList.remove('hat-bounce');
      void hat.offsetWidth;
      hat.classList.add('hat-bounce');
    }

    if (currentBubble?.parentNode) currentBubble.remove();
    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble';
    bubble.textContent = responses[Math.floor(Math.random() * responses.length)];
    ccContainer.appendChild(bubble);
    currentBubble = bubble;
    setTimeout(() => bubble.remove(), 2200);

    for (let i = 0; i < 3; i++) {
      setTimeout(() => {
        const heart = document.createElement('div');
        heart.className = 'heart-burst';
        heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = `${e.clientX + (Math.random() - 0.5) * 60}px`;
        heart.style.top = `${e.clientY + (Math.random() - 0.5) * 40}px`;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1500);
      }, i * 100);
    }

    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = '40px';
    ripple.style.left = `${e.clientX - 20}px`;
    ripple.style.top = `${e.clientY - 20}px`;
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
  }
</script>
</body>
</html>
